[pytest]
minversion = 8.0
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --import-mode=importlib
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    capstone: marks capstone-only tests
norecursedirs = .venv venv .git __pycache__ .ipynb_checkpoints build dist *.egg-info
